<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Health">
<title>My Health</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0f;--surface:#0f1117;--surface2:#161b24;--surface3:#1d2333;
  --border:#1e2535;--border2:#252d3d;--text:#eef0f7;--muted:#5a6480;--muted2:#8892aa;
  --green:#3ddc84;--green-dim:rgba(61,220,132,0.12);
  --blue:#4d9cff;--blue-dim:rgba(77,156,255,0.12);
  --orange:#ff8c42;--orange-dim:rgba(255,140,66,0.12);
  --purple:#9b6dff;--purple-dim:rgba(155,109,255,0.12);
  --red:#ff5c5c;--red-dim:rgba(255,92,92,0.12);
  --yellow:#ffd166;--yellow-dim:rgba(255,209,102,0.12);
  --teal:#2dd4bf;--teal-dim:rgba(45,212,191,0.12);
  --pink:#f472b6;--pink-dim:rgba(244,114,182,0.12);
  --mon:#4d9cff;--tue:#ffd166;--wed:#3ddc84;--thu:#9b6dff;--fri:#ff5c5c;--sat:#2dd4bf;--sun:#f472b6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(8,10,15,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;transition:all 0.2s;}
.nav-icon{font-size:20px;transition:transform 0.2s;}
.nav-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.5px;transition:color 0.2s;}
.nav-item.active .nav-label{color:var(--green);}
.nav-item.active .nav-icon{transform:scale(1.1);}

/* ── VIEWS ── */
.view{display:none;padding-bottom:80px;}
.view.active{display:block;}

/* ── PAGE HEADER ── */
.page-header{padding:20px 20px 16px;background:linear-gradient(180deg,rgba(8,10,15,1) 0%,rgba(8,10,15,0) 100%);}
.page-eyebrow{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.1;}
.page-subtitle{font-size:13px;color:var(--muted2);margin-top:4px;}

/* ── SCHEDULE HEADER ── */
.sched-header{position:sticky;top:0;z-index:50;background:rgba(8,10,15,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px 10px;}
.sched-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sched-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.sched-date{font-size:11px;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
.day-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:all 0.18s;white-space:nowrap;}
.day-tab.active{color:#fff;border-color:transparent;}
.day-tab[data-i="0"].active{background:var(--mon);}
.day-tab[data-i="1"].active{background:var(--tue);color:#000;}
.day-tab[data-i="2"].active{background:var(--wed);color:#000;}
.day-tab[data-i="3"].active{background:var(--thu);}
.day-tab[data-i="4"].active{background:var(--fri);}
.day-tab[data-i="5"].active{background:var(--sat);color:#000;}
.day-tab[data-i="6"].active{background:var(--sun);}

/* ── PROGRESS ── */
.prog-wrap{padding:10px 16px 0;display:flex;align-items:center;gap:10px;}
.prog-track{flex:1;height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width 0.5s ease;}
.prog-label{font-size:11px;color:var(--muted);min-width:48px;text-align:right;font-variant-numeric:tabular-nums;}
.reset-btn{display:block;margin:10px 16px 0;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;text-align:center;width:calc(100% - 32px);font-family:inherit;transition:all 0.18s;}
.reset-btn:active{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.all-done{display:none;margin:10px 16px 0;background:var(--green-dim);border:1px solid rgba(61,220,132,0.25);border-radius:12px;padding:12px 16px;text-align:center;font-size:13px;font-weight:600;color:var(--green);}

/* ── SCHEDULE SLOTS ── */
.schedule{padding:10px 16px 20px;}
.hour-group{margin-bottom:2px;}
.hour-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:12px 2px 4px;display:flex;align-items:center;gap:8px;}
.hour-line{flex:1;height:1px;background:var(--border);}
.slot{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;margin-bottom:3px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;min-height:50px;}
.slot.checked{background:var(--green-dim);border-color:rgba(61,220,132,0.2);}
.slot.empty{opacity:0.2;pointer-events:none;}
.slot:active{transform:scale(0.99);}
.slot-time{font-size:10px;font-weight:600;color:var(--muted);min-width:58px;font-variant-numeric:tabular-nums;}
.slot-ring{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:800;transition:all 0.2s;color:transparent;}
.slot.checked .slot-ring{background:var(--green);border-color:var(--green);color:#000;}
.slot-task{font-size:13px;font-weight:500;flex:1;line-height:1.3;}
.slot.checked .slot-task{text-decoration:line-through;color:var(--muted);}

/* ── HEALTH DASHBOARD ── */
.dash-wrap{padding:0 16px 20px;}

/* Greeting card */
.greeting-card{background:linear-gradient(135deg,var(--surface2) 0%,var(--surface3) 100%);border:1px solid var(--border2);border-radius:20px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden;}
.greeting-card::after{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(61,220,132,0.08) 0%,transparent 70%);border-radius:50%;}
.greeting-time{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.greeting-text{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:2px;}
.greeting-date{font-size:12px;color:var(--muted2);}

/* Section headers */
.dash-section{display:flex;align-items:center;gap:8px;margin:20px 0 10px;}
.dash-section-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.dash-section-line{flex:1;height:1px;background:var(--border);}

/* Metric cards */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 14px;position:relative;overflow:hidden;transition:border-color 0.2s;}
.metric-card.has-data{border-color:var(--border2);}
.metric-accent{position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0;}
.metric-icon{font-size:18px;margin-bottom:8px;display:block;}
.metric-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;}
.metric-value-row{display:flex;align-items:baseline;gap:4px;}
.metric-value{font-size:26px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
.metric-unit{font-size:11px;color:var(--muted);font-weight:500;}
.metric-empty-val{font-size:22px;font-weight:700;color:var(--border2);}
.metric-trend{font-size:10px;font-weight:600;margin-top:4px;}
.trend-up{color:var(--green);}
.trend-down{color:var(--red);}
.trend-neutral{color:var(--muted);}
.metric-status{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;}
.status-optimal{background:var(--green-dim);color:var(--green);}
.status-watch{background:var(--yellow-dim);color:var(--yellow);}
.status-low{background:var(--red-dim);color:var(--red);}

/* Macro card */
.macro-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 16px;}
.macro-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.macro-title{font-size:12px;font-weight:700;color:var(--text);}
.macro-cals{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
.macro-row{margin-bottom:11px;}
.macro-row:last-child{margin-bottom:0;}
.macro-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.macro-name{font-size:12px;font-weight:600;}
.macro-val{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;}
.macro-bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.macro-bar-fill{height:100%;border-radius:3px;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1);}

/* Biomarker section */
.biomarker-category{margin-bottom:6px;}
.biom-cat-header{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.2s;}
.biom-cat-header.open{border-radius:12px 12px 0 0;border-bottom-color:transparent;}
.biom-cat-icon{font-size:16px;}
.biom-cat-name{font-size:13px;font-weight:600;flex:1;}
.biom-cat-count{font-size:10px;color:var(--muted);font-weight:600;}
.biom-cat-arrow{font-size:10px;color:var(--muted);transition:transform 0.2s;}
.biom-cat-header.open .biom-cat-arrow{transform:rotate(90deg);}
.biom-items{display:none;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;}
.biom-items.open{display:block;}
.biom-item{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;}
.biom-item:last-child{border-bottom:none;}
.biom-name{font-size:12px;font-weight:500;flex:1;}
.biom-value-wrap{text-align:right;}
.biom-value{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.biom-range{font-size:10px;color:var(--muted);margin-top:1px;}
.biom-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.biom-dot.optimal{background:var(--green);}
.biom-dot.watch{background:var(--yellow);}
.biom-dot.low{background:var(--red);}
.biom-dot.empty{background:var(--border2);}
.biom-empty{font-size:12px;color:var(--muted);font-style:italic;}

/* Manual entry */
.manual-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 16px;margin-top:6px;}
.manual-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.manual-sub{font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.manual-tabs{display:flex;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:14px;gap:3px;}
.manual-tab{flex:1;padding:7px;text-align:center;font-size:11px;font-weight:600;border-radius:8px;cursor:pointer;color:var(--muted);transition:all 0.2s;}
.manual-tab.active{background:var(--surface3);color:var(--text);}
.manual-panel{display:none;}
.manual-panel.active{display:block;}
.manual-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mf label{font-size:10px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.mf input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color 0.2s;}
.mf input:focus{border-color:var(--green);}
.save-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--green);color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.2s;}
.save-btn:active{opacity:0.8;}

/* Refresh */
.refresh-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;padding:11px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;transition:all 0.18s;}
.refresh-btn:active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}

/* Setup banner */
.setup-banner{background:var(--blue-dim);border:1px solid rgba(77,156,255,0.2);border-radius:14px;padding:14px 16px;margin-bottom:16px;}
.setup-title{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:4px;}
.setup-text{font-size:11px;color:var(--muted2);line-height:1.6;}

/* ── PROGRESS PHOTOS ── */
.photo-header{padding:20px 20px 0;}
.photo-wrap{padding:0 16px 20px;}
.photo-month-banner{background:var(--green-dim);border:1px solid rgba(61,220,132,0.2);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.photo-month-icon{font-size:24px;}
.photo-month-text{flex:1;}
.photo-month-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:2px;}
.photo-month-sub{font-size:11px;color:var(--muted2);}
.capture-btn{width:100%;padding:16px;border-radius:16px;border:none;background:var(--green);color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s;}
.capture-btn:active{opacity:0.8;}
.sessions-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
.session-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.session-date{font-size:13px;font-weight:700;}
.session-weight{font-size:12px;color:var(--muted);background:var(--surface2);padding:3px 8px;border-radius:8px;}
.session-photos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.session-photo{aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:var(--surface2);border:1px solid var(--border);position:relative;cursor:pointer;}
.session-photo img{width:100%;height:100%;object-fit:cover;}
.session-photo-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:6px 6px 4px;font-size:9px;font-weight:700;color:white;text-align:center;letter-spacing:1px;text-transform:uppercase;}
.session-photo-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:4px;}
.session-photo-empty-icon{font-size:20px;opacity:0.3;}
.session-photo-empty-text{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.no-sessions{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.7;}
.no-sessions-icon{font-size:40px;margin-bottom:12px;display:block;opacity:0.4;}
/* Capture modal */
.capture-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:400;flex-direction:column;}
.capture-overlay.open{display:flex;}
.capture-top{padding:20px 20px 10px;display:flex;align-items:center;justify-content:space-between;}
.capture-close{font-size:24px;color:var(--muted);cursor:pointer;padding:4px;}
.capture-step{font-size:11px;font-weight:700;color:var(--green);letter-spacing:2px;text-transform:uppercase;}
.capture-progress{display:flex;gap:6px;padding:0 20px 16px;}
.capture-pip{flex:1;height:3px;border-radius:2px;background:var(--border);}
.capture-pip.done{background:var(--green);}
.capture-pip.active{background:var(--green);opacity:0.5;}
.capture-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.capture-preview{width:100%;max-width:300px;aspect-ratio:3/4;border-radius:20px;overflow:hidden;background:var(--surface2);border:2px solid var(--border2);margin-bottom:24px;position:relative;display:flex;align-items:center;justify-content:center;}
.capture-preview video{width:100%;height:100%;object-fit:cover;}
.capture-preview img{width:100%;height:100%;object-fit:cover;}
.capture-guide{text-align:center;margin-bottom:20px;}
.capture-guide-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:6px;}
.capture-guide-sub{font-size:13px;color:var(--muted2);line-height:1.6;}
.capture-actions{display:flex;gap:10px;width:100%;max-width:300px;}
.shutter-btn{flex:1;padding:16px;border-radius:14px;border:none;background:white;color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.retake-btn{padding:16px 20px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.next-btn{flex:1;padding:16px;border-radius:14px;border:none;background:var(--green);color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:500;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:12px;}
.lightbox-close{position:absolute;top:20px;right:20px;font-size:28px;color:white;cursor:pointer;opacity:0.7;}
.lightbox-label{margin-top:12px;font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
/* Admin */
.admin-btn{position:fixed;bottom:80px;right:16px;width:42px;height:42px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;align-items:flex-end;justify-content:center;padding:0;}
.admin-overlay.open{display:flex;}
.admin-box{background:var(--surface);border:1px solid var(--border2);border-radius:24px 24px 0 0;padding:24px 24px max(24px,env(safe-area-inset-bottom));width:100%;max-width:500px;}
.admin-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.admin-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:6px;}
.admin-sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;}
.admin-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;margin-bottom:10px;outline:none;box-sizing:border-box;transition:border-color 0.2s;}
.admin-input:focus{border-color:var(--green);}
.admin-submit{width:100%;padding:14px;border-radius:12px;border:none;background:var(--green);color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;transition:opacity 0.2s;}
.admin-submit:disabled{opacity:0.4;cursor:default;}
.admin-cancel{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.admin-status{text-align:center;font-size:12px;padding:8px 0;min-height:20px;line-height:1.5;}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5);pointer-events:none;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<!-- SCHEDULE VIEW -->
<div class="view active" id="view-schedule">
  <div class="sched-header">
    <div class="sched-top">
      <div class="sched-title">My Schedule</div>
